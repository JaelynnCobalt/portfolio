<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earthy Groovy Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Shrikhand&family=DM+Serif+Display&family=Montserrat:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --mustard: #E9B44C;
            --sage: #9AB080;
            --teal: #51ABB2;
            --salmon: #E88D8D;
            --cream: #F1E9DB;
            --dark: #3B3B3B;
            --orange-red: #D95D39;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--cream);
            /* The Sunburst Background Effect */
            background: conic-gradient(
                from 180deg at 50% 50%,
                var(--teal) 0deg 30deg,
                var(--mustard) 30deg 60deg,
                var(--salmon) 60deg 90deg,
                var(--sage) 90deg 120deg,
                var(--orange-red) 120deg 150deg,
                var(--teal) 150deg 180deg,
                var(--mustard) 180deg 210deg,
                var(--salmon) 210deg 240deg,
                var(--sage) 240deg 270deg,
                var(--orange-red) 270deg 300deg,
                var(--teal) 300deg 330deg,
                var(--mustard) 330deg 360deg
            );
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Scalloped / Wavy Card */
        .scallop-card {
            background-color: var(--cream);
            width: 100%;
            max-width: 600px;
            padding: 60px 40px;
            text-align: center;
            border: 8px solid var(--orange-red);
            position: relative;
            /* Creating the 'bubbly' edge effect */
            border-radius: 50% 50% 50% 50% / 15% 15% 15% 15%;
            box-shadow: 0 0 0 15px var(--mustard), 0 20px 50px rgba(0,0,0,0.2);
        }

        .inner-content {
            border-top: 2px solid var(--dark);
            margin-top: 20px;
            padding-top: 20px;
        }

        h1 {
            font-family: 'Shrikhand', cursive;
            font-size: 4rem;
            color: var(--dark);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h2 {
            font-family: 'DM Serif Display', serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 1.2rem;
            color: var(--dark);
            margin-bottom: 30px;
        }

        p.handle {
            font-family: 'DM Serif Display', serif;
            font-style: italic;
            color: var(--dark);
            font-size: 1.1rem;
            opacity: 0.8;
        }

        /* Flower Decorations */
        .flower {
            position: absolute;
            width: 80px;
            height: 80px;
            z-index: 2;
        }

        .f-1 { top: -40px; right: 20px; transform: rotate(15deg); }
        .f-2 { bottom: 20px; left: -40px; transform: rotate(-20deg); }
        .f-3 { bottom: -30px; right: 60px; }

        .pricing-list {
            list-style: none;
            padding: 0;
            text-align: left;
            display: inline-block;
            width: 100%;
        }

        .price-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 600;
            border-bottom: 1px dashed var(--teal);
            padding-bottom: 5px;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            background-color: var(--dark);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-family: 'DM Serif Display', serif;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: var(--teal);
            transform: scale(1.05);
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .scallop-card { border-radius: 30px; padding: 40px 20px; }
            .flower { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>

    <div class="scallop-card">
        <svg class="flower f-1" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="20" fill="#E9B44C" stroke="#3B3B3B" stroke-width="3"/>
            <ellipse cx="50" cy="15" rx="10" ry="15" fill="#51ABB2" stroke="#3B3B3B" stroke-width="3"/>
            <ellipse cx="50" cy="85" rx="10" ry="15" fill="#51ABB2" stroke="#3B3B3B" stroke-width="3"/>
            <ellipse cx="15" cy="50" rx="15" ry="10" fill="#51ABB2" stroke="#3B3B3B" stroke-width="3"/>
            <ellipse cx="85" cy="50" rx="15" ry="10" fill="#51ABB2" stroke="#3B3B3B" stroke-width="3"/>
        </svg>

        <svg class="flower f-2" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="20" fill="#E9B44C" stroke="#3B3B3B" stroke-width="3"/>
            <ellipse cx="50" cy="15" rx="10" ry="15" fill="#E88D8D" stroke="#3B3B3B" stroke-width="3"/>
            <ellipse cx="50" cy="85" rx="10" ry="15" fill="#E88D8D" stroke="#3B3B3B" stroke-width="3"/>
            <ellipse cx="15" cy="50" rx="15" ry="10" fill="#E88D8D" stroke="#3B3B3B" stroke-width="3"/>
            <ellipse cx="85" cy="50" rx="15" ry="10" fill="#E88D8D" stroke="#3B3B3B" stroke-width="3"/>
        </svg>

        <h1>Girl</h1>
        <h2>Got Goals</h2>
        
        <div class="inner-content">
            <ul class="pricing-list">
                <li class="price-item"><span>Digital Art</span> <span>$45+</span></li>
                <li class="price-item"><span>Copywriting</span> <span>$0.10/wd</span></li>
                <li class="price-item"><span>Proofreading</span> <span>$15/pg</span></li>
            </ul>
            
            <p class="handle">@reallygreatsite</p>
            <a href="#" class="btn">Work With Me</a>
        </div>
    </div>

</body>
</html>
